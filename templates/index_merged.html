<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Suite</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --accent-active: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --occupied-color: #ef4444;
            --vacant-color: #10b981;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Architecture Layout */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .brand-section {
            padding: 0 24px 20px 24px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }

        .brand-section h2 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: -0.03em;
        }

        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-item.active {
            background-color: var(--accent-active);
            color: var(--text-main);
        }

        /* Core Content Viewports */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .view-panel {
            display: none; /* Controlled via JS switching */
            max-width: 1200px;
            margin: 0 auto;
        }

        .view-panel.active {
            display: block;
        }

        .view-title {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }

        /* Metric Card Layouts */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            margin-top: 15px;
        }

        .stat-box {
            border-radius: 8px;
            padding: 20px 15px;
            text-align: center;
        }

        .stat-box.occupied { background-color: rgba(239, 68, 68, 0.12); border: 1px solid var(--occupied-color); }
        .stat-box.vacant { background-color: rgba(16, 185, 129, 0.12); border: 1px solid var(--vacant-color); }

        .number { font-size: 2.8rem; font-weight: 800; margin: 4px 0 0 0; }
        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }

        .progress-bar-container {
            background-color: #334155;
            border-radius: 9999px;
            height: 12px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            transition: width 0.4s ease;
        }

        .stat-summary {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* Video Feed View Element Container */
        .video-container {
            background-color: #000;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .video-container img {
            width: 100%;
            height: auto;
            max-width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR NAVIGATION MENU -->
    <div class="sidebar">
        <div class="brand-section">
            <h2>VisionPark AI</h2>
            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Control Center v2.0</div>
        </div>
        <ul class="nav-list">
            <li class="nav-item active" onclick="switchView('dashboard', this)">
                <span style="margin-right: 12px;">📊</span> Dashboard Overview
            </li>
            <li class="nav-item" onclick="switchView('livestream', this)">
                <span style="margin-right: 12px;">🎥</span> Live Video Stream
            </li>
        </ul>
    </div>

    <!-- MAIN VIEWPORT COMPONENT PANELS -->
    <div class="main-content">
        
        <!-- PANEL VIEW A: DASHBOARD -->
        <div id="view-dashboard" class="view-panel active">
            <h1 class="view-title">Dashboard Overview</h1>
            <div class="dashboard-grid">
                <!-- Total Combined Lot Card -->
                <div class="card">
                    <div style="font-size: 1.2rem; font-weight: 700;">🚗 Total Lot Status</div>
                    <div class="status-grid">
                        <div class="stat-box occupied">
                            <div class="label">Occupied</div>
                            <div class="number" id="lot-occupied">0</div>
                        </div>
                        <div class="stat-box vacant">
                            <div class="label">Vacant</div>
                            <div class="number" id="lot-vacant">0</div>
                        </div>
                    </div>
                    <div>
                        <span class="label">Lot Occupancy Load</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="lot-progress"></div>
                        </div>
                        <div class="stat-summary">
                            <span id="lot-percentage">0% Full</span>
                            <span id="lot-total">Total Spots: 0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PANEL VIEW B: LIVESTREAM VIDEO -->
        <div id="view-livestream" class="view-panel">
            <h1 class="view-title">Live Video Stream</h1>
            <div class="video-container">
                <!-- Points directly to Flask MJPEG stream route -->
                <img src="/video_feed" alt="Combined Live AI Camera Feed Processing Platform">
            </div>
        </div>

    </div>

    <!-- RUNTIME TELEMETRY DATA SCRIPTS -->
    <script>
        // Tab switching logic controller
        function switchView(viewName, clickedElement) {
            // Remove active classes on nav
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // Add active class to target menu item
            clickedElement.classList.add('active');

            // Toggle viewport visibility classes
            document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
        }

        // Telemetry Data Poll
        function updateTelemetry() {
            fetch('/api/parking')
                .then(res => res.json())
                .then(data => {
                    const stats = data.total_lot;
                    document.getElementById('lot-occupied').innerText = stats.occupied;
                    document.getElementById('lot-vacant').innerText = stats.available;
                    document.getElementById('lot-total').innerText = `Total Spots: ${stats.total}`;

                    let percent = stats.total > 0 ? Math.round((stats.occupied / stats.total) * 100) : 0;
                    document.getElementById('lot-percentage').innerText = `${percent}% Full`;
                    
                    const progressBar = document.getElementById('lot-progress');
                    progressBar.style.width = `${percent}%`;

                    // Dynamic color states
                    if (percent < 50) progressBar.style.backgroundColor = '#10b981';
                    else if (percent < 85) progressBar.style.backgroundColor = '#f59e0b';
                    else progressBar.style.backgroundColor = '#ef4444';
                })
                .catch(err => console.error("Error reading JSON server data metrics: ", err));
        }

        // Run telemetry sync tasks loop independently from video stream rendering
        setInterval(updateTelemetry, 1000);
        updateTelemetry();
    </script>
</body>
</html>
